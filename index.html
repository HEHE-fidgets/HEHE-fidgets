<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <title>HEHE Fidgets</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      margin: 0;
      padding: 0;
    }

    header {
      text-align: center;
      padding: 20px;
      background: #1a1a1a;
    }

    .logo {
      max-width: 180px;
      height: auto;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
      gap: 15px;
    }

    .product {
      background: #222;
      padding: 15px;
      border-radius: 12px;
      width: 220px;
    }

    .product img {
      width: 100%;
      border-radius: 10px;
    }

    .price {
      color: #00ff99;
      font-weight: bold;
    }

    .status {
      font-size: 12px;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<header>
  <!-- BYTT DENNE TIL LOGOEN DIN -->
  <img class="logo" src="https://i.ibb.co/SXKG78xk/68121c6d-6301-427e-9d36-422735e7837c.png" alt="HEHE Fidgets logo">

  <h1>HEHE Fidgets</h1>
</header>

<div class="container" id="products"></div>

<script>
fetch('products.json')
.then(res => res.json())
.then(products => {

  const container = document.getElementById('products');

  products.forEach(p => {

    container.innerHTML += `
      <div class="product">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p class="price">${p.price}</p>
        <p>${p.description}</p>
        <p class="status">${p.available ? "Tilgjengelig" : "Utsolgt"}</p>
      </div>
    `;
  });

});
</script>

</body>
</html>
